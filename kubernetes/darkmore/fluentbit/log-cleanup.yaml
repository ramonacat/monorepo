apiVersion: batch/v1
kind: CronJob
metadata:
  name: log-cleanup
  namespace: fluent-operator
spec:
  schedule: '0/10 * * * *'
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup-logs
              image: postgres:18.4
              imagePullPolicy: IfNotPresent
              command: ["psql", "-c", "DELETE FROM logs WHERE time < date_add(current_timestamp, '-12 hours'::interval)", "--host=cloudnative-pg-database-cluster-pooler-rw.cloudnative-pg-database"]
              env:
                - name: PGPASSFILE
                  value: '/etc/secrets/pgpass'
                - name: PGUSER
                  value: fluentbit
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      key: POSTGRES_PASSWORD
                      name: fluentbit
