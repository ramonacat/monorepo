apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ras
spec:
  parentRefs:
  - name: gateway-public
    namespace: kgateway-system
  hostnames:
    - ras.infrastructure.ramona.fun
  rules:
    - backendRefs:
      - name: ras
        kind: Service
        group: gateway.kgateway.dev
        port: 3000
