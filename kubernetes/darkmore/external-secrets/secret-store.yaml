apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: "https://vault.acme.org"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "secrets/kubernetes/darkmore"
          role: "kv-kubernetes-darkmore"
          serviceAccountRef:
            name: "vault-client"
            namespace: "external-secrets"
