apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: vault-self-issuer
  namespace: vault
spec:
  vault:
    auth:
      kubernetes:
        role: cert-manager
        serviceAccountRef:
          name: vault-issuer
    path: pki-internal/sign/internal
    server: https://vault.vault:8200/
    serverName: vault.internal.ramona.fun
    caBundle: 
