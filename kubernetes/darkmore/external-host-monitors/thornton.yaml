apiVersion: v1
kind: Service
metadata:
  name: thornton-prometheus-exporters
  annotations:
    tailscale.com/tailnet-fqdn: "thornton.ibis-draconis.ts.net"
    tailscale.com/proxy-group: "egress-proxies"
spec:
  type: ExternalName
  externalName: placeholder
  ports:
    - port: 9100
      protocol: TCP
      name: node

    - port: 9633
      protocol: TCP
      name: smart
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: thornton
spec:
  staticConfigs:
    - targets:
      - thornton-prometheus-exporters.external-host-monitors:9100
      - thornton-prometheus-exporters.external-host-monitors:9633
