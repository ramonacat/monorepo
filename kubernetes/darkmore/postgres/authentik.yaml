---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: authentik
  namespace: cloudnative-pg-database
spec:
  encryptedData:
    password: 
    username: 
  template:
    metadata:
      labels:
        cnpg.io/reload: "true"
      name: authentik
      namespace: cloudnative-pg-database
    type: Opaque
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: authentik-env-secrets
  namespace: authentik
spec:
  encryptedData:
    AUTHENTIK_EMAIL__PASSWORD: 
    AUTHENTIK_POSTGRESQL__PASSWORD: 
    AUTHENTIK_POSTGRESQL__READ_REPLICAS__0__PASSWORD: 
    AUTHENTIK_POSTGRESQL__READ_REPLICAS__0__USER: 
    AUTHENTIK_POSTGRESQL__USER: 
    AUTHENTIK_SECRET_KEY: 
  template:
    metadata:
      name: authentik-env-secrets
      namespace: authentik
    type: Opaque
