apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: opensearch-dashboards
  namespace: opensearch-dashboards
spec:
  hostnames:
    - opensearch-dashboards.infrastructure.ramona.fun
  parentRefs:
    - name: gateway-tailscale 
      namespace: kgateway-system
  rules:
    - backendRefs:
        - kind: Service
          name: opensearch-dashboards
          port: 5601
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
