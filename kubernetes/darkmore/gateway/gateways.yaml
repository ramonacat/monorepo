apiVersion: gateway.kgateway.dev/v1alpha1
kind: ListenerPolicy
metadata:
  name: gateway-public
  namespace: kgateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: gateway-public
  default: 
    proxyProtocol: {}
    httpSettings:
      accessLog: 
        - fileSink:
            path: /dev/stdout
            jsonFormat:
              start_time: "%START_TIME%"
              method: "%REQ(X-ENVOY-ORIGINAL-METHOD?:METHOD)%"
              path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
              protocol: "%PROTOCOL%"
              response_code: "%RESPONSE_CODE%"
              response_flags: "%RESPONSE_FLAGS%"
              bytes_received: "%BYTES_RECEIVED%"
              bytes_sent: "%BYTES_SENT%"
              total_duration: "%DURATION%"
              resp_backend_service_time: "%RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)%"
              req_x_forwarded_for: "%REQ(X-FORWARDED-FOR)%"
              user_agent: "%REQ(USER-AGENT)%"
              request_id: "%REQ(X-REQUEST-ID)%"
              authority: "%REQ(:AUTHORITY)%"
              backendHost: "%UPSTREAM_HOST%"
              backendCluster: "%UPSTREAM_CLUSTER%"
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayParameters
metadata:
  name: gateway-public
  namespace: kgateway-system
spec:
  kube:
    deployment:
      replicas: 2
    service:
      type: LoadBalancer
      extraAnnotations:
        "load-balancer.hetzner.cloud/name": "gateway-public"
        "load-balancer.hetzner.cloud/location": "nbg1"
        "load-balancer.hetzner.cloud/uses-proxyprotocol": "true"
        "load-balancer.hetzner.cloud/private-subnet-ip-range": "10.1.0.0/24"
        "load-balancer.hetzner.cloud/disable-private-ingress": "true"
        "load-balancer.hetzner.cloud/use-private-ip": "true"
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-public
  namespace: kgateway-system
  annotations: 
    cert-manager.io/cluster-issuer: cert-manager-webhook-dnsimple-production
spec: 
  gatewayClassName: 'kgateway'
  infrastructure:
    parametersRef:
      group: gateway.kgateway.dev
      kind: GatewayParameters
      name: gateway-public

  allowedListeners:
    namespaces:
      from: All

  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          # there's only one route allowed for HTTP, and it is the HTTPS redirect
          from: Same
    - name: https
      port: 443
      protocol: HTTPS
      hostname: '*.ramona.fun'
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-ramona-fun
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayParameters
metadata:
  name: gateway-tailscale
  namespace: kgateway-system
spec:
  kube:
    deployment:
      replicas: 2
    service:
      type: LoadBalancer
      loadBalancerClass: 'tailscale'
      extraAnnotations:
        "tailscale.com/proxy-group": "service-ingress"
        "tailscale.com/tags": "tag:k8s,tag:k8s-service"
        "tailscale.com/hostname": "gateway"
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-tailscale
  namespace: kgateway-system
  annotations: 
    # TODO https://github.com/kubernetes-sigs/external-dns/issues/6507
    "external-dns.alpha.kubernetes.io/target": "100.119.189.53"
    cert-manager.io/cluster-issuer: cert-manager-webhook-dnsimple-production
spec: 
  gatewayClassName: 'kgateway'
  infrastructure:
    parametersRef:
      group: gateway.kgateway.dev
      kind: GatewayParameters
      name: gateway-tailscale

  allowedListeners:
    namespaces:
      from: All

  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          # there's only one route allowed for HTTP, and it is the HTTPS redirect
          from: Same
    - name: https
      port: 443
      protocol: HTTPS
      hostname: '*.infrastructure.ramona.fun'
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: wildcard-infrastructure-ramona-fun
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https
  namespace: kgateway-system
spec:
  parentRefs:
    - name: gateway-tailscale 
      namespace: kgateway-system
      sectionName: http
    - name: gateway-public
      namespace: kgateway-system
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: GatewayParameters
metadata:
  name: gateway-tailscale-internal
  namespace: kgateway-system
spec:
  kube:
    deployment:
      replicas: 2
    service:
      type: LoadBalancer
      loadBalancerClass: 'tailscale'
      extraAnnotations:
        "tailscale.com/proxy-group": "service-ingress"
        "tailscale.com/tags": "tag:k8s,tag:k8s-service"
        "tailscale.com/hostname": "gateway-internal"
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-tailscale-internal
  namespace: kgateway-system
  annotations: 
    # TODO https://github.com/kubernetes-sigs/external-dns/issues/6507
    "external-dns.alpha.kubernetes.io/target": "100.86.28.137"
spec: 
  gatewayClassName: 'kgateway'
  infrastructure:
    parametersRef:
      group: gateway.kgateway.dev
      kind: GatewayParameters
      name: gateway-tailscale-internal

  allowedListeners:
    namespaces:
      from: All

  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          # there's only one route allowed for HTTP, and it is the HTTPS redirect
          from: All
    - name: https
      port: 443
      protocol: TLS
      hostname: '*.internal.ramona.fun'
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Passthrough
