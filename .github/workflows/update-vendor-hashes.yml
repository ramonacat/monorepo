name: update-vendor-hashes
on: pull_request_target

permissions:
  pull-requests: write
  contents: write

jobs:
  update-vendor-hashes:
    runs-on: self-hosted
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: "${{ secrets.PAT }}"

      - name: Extract branch name
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
        id: extract_branch

      - name: run the update script
        if: "${{ startsWith(steps.extract_branch.outputs.branch, 'dependabot') }}"
        run: "git checkout $GITHUB_HEAD_REF && nix develop --command './.github/scripts/update-vendor-hashes.sh'"
    
