name: All Checks
on: 
  pull_request: ~
  push:
    branches:
      - 'main'

jobs:
  flake-check:
    runs-on: self-hosted
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: put the SSH key in a file
        run: mkdir -p ~/.ssh && echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519 && ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub && chmod 0600 ~/.ssh/id_ed25519 

      - name: all checks
        run: nix develop --command './build/check-all'
