---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: default
  namespace: tailscale
spec:
  interval: 10m0s
  url: https://pkgs.tailscale.com/helmcharts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tailscale
  namespace: tailscale
spec:
  valuesFrom:
    - kind: Secret
      name: tailscale
      valuesKey: clientId
      targetPath: clientId
    - kind: Secret
      name: tailscale
      valuesKey: clientSecret
      targetPath: clientSecret
    
  chart:
    spec:
      chart: tailscale
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: tailscale
      version: 1.98.4
  interval: 1m0s
